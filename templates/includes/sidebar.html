{% load static %}
{% load frontend_tags %}
<aside class="sidebar">
  <nav class="sidebar-nav">
    <div class="sidebar-section">
      <span class="sidebar-section-label">Übersicht</span>
      <a href="/" class="sidebar-link {% if request.path == '/' %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-section-label">Geräte &amp; Ausleihe</span>
      <a href="/geraete/" class="sidebar-link {% if request.path == '/geraete/' or request.path|slice:':9' == '/geraete/' %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Geräte
      </a>
      <a href="/ausleihen/" class="sidebar-link {% if '/ausleihen/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        Ausleihen
      </a>
      <a href="/reservierungen/" class="sidebar-link {% if '/reservierungen/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Reservierungen
      </a>
      <a href="/scanner/" class="sidebar-link {% if '/scanner/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 7 23 1 17 1"/><line x1="23" y1="1" x2="14" y2="10"/>
          <polyline points="1 17 1 23 7 23"/><line x1="1" y1="23" x2="10" y2="14"/>
        </svg>
        QR-Scanner
      </a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-section-label">Konto</span>
      <a href="/profil/" class="sidebar-link {% if '/profil/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Mein Profil
      </a>
      <a href="/hilfe/" class="sidebar-link {% if '/hilfe/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Hilfe
      </a>
    </div>

    {% if request.current_user.rolle == 'Administrator' %}
    <div class="sidebar-section sidebar-section--admin">
      <span class="sidebar-section-label">Administration</span>
      <a href="/admin/geraete/" class="sidebar-link {% if '/admin/geraete/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
        Geräteverwaltung
      </a>
      <a href="/admin/benutzer/" class="sidebar-link {% if '/admin/benutzer/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Benutzerverwaltung
      </a>
      <a href="/admin/audit-logs/" class="sidebar-link {% if '/admin/audit-logs/' in request.path %}active{% endif %}">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Audit-Logs
      </a>
    </div>
    {% endif %}
  </nav>

  <div class="sidebar-footer">
    <form method="post" action="/logout/">
      {% csrf_token %}
      <button type="submit" class="sidebar-logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Abmelden
      </button>
    </form>
  </div>
</aside>
